[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish (Angular build output from nested directory)
  publish = "Grudged-Portfolio/dist/Grudged-Portfolio/browser"

[build.environment]
  # Node.js version (Angular 20 requires Node.js 20.19+ or 22.12+)
  NODE_VERSION = "20.19.0"

# Retired domain — permanent 301 to chris-moore.dev.
# Host-based match with conditions (Netlify's documented host-redirect pattern).
# Must come BEFORE the SPA catch-all so it matches first.
[[redirects]]
  from = "/*"
  to = "https://chris-moore.dev/:splat"
  status = 301
  force = true
  conditions = {Host = ["dev-garden.io", "www.dev-garden.io"]}

# Redirect rules for Angular single page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
