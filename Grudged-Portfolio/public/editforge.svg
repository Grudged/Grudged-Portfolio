<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="ef-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="ef-accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ef-bg)"/>

  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">EditForge</text>
  <text x="400" y="68" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13">AI Manuscript Editor · Character Chat · Writing Tools</text>

  <!-- Left: Manuscript Editor -->
  <rect x="40" y="110" width="220" height="260" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="55" y="125" width="190" height="25" rx="4" fill="#0f172a"/>
  <text x="150" y="142" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Chapter 12: The Descent</text>
  <rect x="55" y="160" width="190" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="175" width="160" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="190" width="180" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="205" width="140" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="225" width="190" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="240" width="170" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="255" width="185" height="8" rx="2" fill="#334155"/>
  <rect x="55" y="275" width="90" height="8" rx="2" fill="#06b6d4" opacity="0.4"/>
  <text x="150" y="310" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Manuscript Editor</text>
  <text x="150" y="330" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="9">Rich text · Chapters</text>
  <text x="150" y="345" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="9">Version tracking</text>

  <!-- Center: AI Engine -->
  <rect x="300" y="160" width="200" height="120" rx="12" fill="url(#ef-accent)" opacity="0.9"/>
  <text x="400" y="200" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">AI Engine</text>
  <text x="400" y="225" text-anchor="middle" fill="#cffafe" font-family="JetBrains Mono,monospace" font-size="10">Character voice modeling</text>
  <text x="400" y="243" text-anchor="middle" fill="#cffafe" font-family="JetBrains Mono,monospace" font-size="10">Scene analysis</text>
  <text x="400" y="261" text-anchor="middle" fill="#cffafe" font-family="JetBrains Mono,monospace" font-size="10">Dialogue feedback</text>

  <!-- Arrows -->
  <line x1="265" y1="220" x2="295" y2="220" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="293,215 303,220 293,225" fill="#06b6d4"/>
  <line x1="505" y1="220" x2="535" y2="220" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="533,215 543,220 533,225" fill="#06b6d4"/>

  <!-- Right: Character Chat -->
  <rect x="540" y="110" width="220" height="260" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="650" y="140" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Group Character Chat</text>

  <!-- Chat bubbles -->
  <rect x="560" y="160" width="140" height="35" rx="8" fill="#312e81"/>
  <text x="630" y="175" text-anchor="middle" fill="#c7d2fe" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="500">Kael (Warrior)</text>
  <text x="630" y="189" text-anchor="middle" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="9">"We shouldn't trust him."</text>

  <rect x="600" y="205" width="140" height="35" rx="8" fill="#1e3a5f"/>
  <text x="670" y="220" text-anchor="middle" fill="#7dd3fc" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="500">Sera (Mage)</text>
  <text x="670" y="234" text-anchor="middle" fill="#bae6fd" font-family="Inter,system-ui,sans-serif" font-size="9">"The spell won't hold."</text>

  <rect x="560" y="250" width="140" height="35" rx="8" fill="#1a2e1a"/>
  <text x="630" y="265" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="500">Ren (Thief)</text>
  <text x="630" y="279" text-anchor="middle" fill="#bbf7d0" font-family="Inter,system-ui,sans-serif" font-size="9">"I found another way in."</text>

  <rect x="560" y="300" width="180" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="650" y="319" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">Ask your characters anything...</text>
  <text x="650" y="355" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="9">AI stays in-voice</text>

  <!-- Bottom: Stack -->
  <rect x="100" y="410" width="600" height="55" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="433" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2">STACK</text>
  <text x="180" y="453" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">Angular</text>
  <text x="300" y="453" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">FastAPI</text>
  <text x="420" y="453" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">PostgreSQL</text>
  <text x="540" y="453" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">WebSockets</text>
</svg>
