<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0533"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="sb-accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sb-bg)"/>

  <!-- Stars background -->
  <circle cx="50" cy="40" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="80" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="700" cy="50" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="600" cy="30" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="750" cy="120" r="1" fill="#fff" opacity="0.2"/>
  <circle cx="300" cy="25" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="500" cy="60" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="100" cy="470" r="1" fill="#fff" opacity="0.2"/>
  <circle cx="680" cy="460" r="1.5" fill="#fff" opacity="0.3"/>

  <text x="400" y="50" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700">StarBrain Academy</text>
  <text x="400" y="75" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13">Interactive Kids Learning PWA · 6 Subjects · Mini-Games</text>

  <!-- Subject cards in 2 rows of 3 -->
  <rect x="60" y="110" width="200" height="90" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="142" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="20">&#x1F4D0;</text>
  <text x="160" y="165" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Math</text>
  <text x="160" y="185" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Arithmetic · Puzzles</text>

  <rect x="300" y="110" width="200" height="90" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="142" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="20">&#x1F30D;</text>
  <text x="400" y="165" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Science</text>
  <text x="400" y="185" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Experiments · Discovery</text>

  <rect x="540" y="110" width="200" height="90" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="640" y="142" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="20">&#x1F4DA;</text>
  <text x="640" y="165" text-anchor="middle" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Reading</text>
  <text x="640" y="185" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Stories · Comprehension</text>

  <rect x="60" y="220" width="200" height="90" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="160" y="252" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="20">&#x1F3A8;</text>
  <text x="160" y="275" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Art</text>
  <text x="160" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Colors · Creativity</text>

  <rect x="300" y="220" width="200" height="90" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="252" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="20">&#x1F3B5;</text>
  <text x="400" y="275" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Music</text>
  <text x="400" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Rhythm · Instruments</text>

  <rect x="540" y="220" width="200" height="90" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="640" y="252" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="20">&#x1F4BB;</text>
  <text x="640" y="275" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Coding</text>
  <text x="640" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Logic · Patterns</text>

  <!-- Features -->
  <rect x="100" y="345" width="200" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="370" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Adaptive Difficulty</text>
  <text x="200" y="388" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Adjusts to each child</text>

  <rect x="320" y="345" width="160" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="370" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Mini-Games</text>
  <text x="400" y="388" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Interactive learning</text>

  <rect x="500" y="345" width="200" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="370" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Zero Dependencies</text>
  <text x="600" y="388" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">15K LOC learning engine</text>

  <!-- Bottom -->
  <rect x="150" y="430" width="500" height="45" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="260" y="458" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">Vite + Preact</text>
  <text x="400" y="458" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">TypeScript</text>
  <text x="540" y="458" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">PWA · Offline</text>
</svg>
