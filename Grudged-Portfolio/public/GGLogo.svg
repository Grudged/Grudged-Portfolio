<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main green gradient - subtle depth, single hue family -->
    <linearGradient id="green-main" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Lighter highlight for top edges -->
    <linearGradient id="green-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Darker shade for depth -->
    <linearGradient id="green-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle inner glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Left bracket < -->
  <g filter="url(#shadow)">
    <polygon points="60,256 170,140 200,170 105,256 200,342 170,372" fill="url(#green-dark)" opacity="0.95"/>
    <!-- Highlight edge -->
    <polygon points="170,140 200,170 105,256 60,256" fill="url(#green-light)" opacity="0.3"/>
  </g>

  <!-- Right bracket > -->
  <g filter="url(#shadow)">
    <polygon points="452,256 342,140 312,170 407,256 312,342 342,372" fill="url(#green-dark)" opacity="0.95"/>
    <!-- Highlight edge -->
    <polygon points="342,140 312,170 407,256 452,256" fill="url(#green-light)" opacity="0.3"/>
  </g>

  <!-- Slash / through the middle -->
  <g filter="url(#shadow)">
    <polygon points="295,110 325,110 220,402 190,402" fill="url(#green-main)" opacity="0.9"/>
    <!-- Highlight -->
    <polygon points="295,110 325,110 310,160 280,160" fill="url(#green-light)" opacity="0.25"/>
  </g>

  <!-- G letter - centered -->
  <g filter="url(#shadow)">
    <!-- G outer arc - approximated with path -->
    <path d="M330,210 A85,85 0 1,0 330,310 L330,270 L280,270 L280,300 A55,55 0 1,1 300,195 Z"
          fill="url(#green-main)" stroke="none"/>
    <!-- G highlight on top curve -->
    <path d="M330,210 A85,85 0 0,0 200,230"
          fill="none" stroke="url(#green-light)" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Pixel accents - small squares near the G -->
  <g opacity="0.7">
    <rect x="335" y="185" width="12" height="12" rx="2" fill="url(#green-main)" filter="url(#shadow)"/>
    <rect x="355" y="170" width="9" height="9" rx="1.5" fill="url(#green-light)" opacity="0.6"/>
    <rect x="350" y="195" width="8" height="8" rx="1.5" fill="url(#green-main)" opacity="0.5"/>
  </g>
</svg>
