<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="rw-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0c1a2e"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="rw-ocean" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e7490" opacity="0.3"/><stop offset="100%" stop-color="#155e75" opacity="0.1"/></linearGradient>
    <linearGradient id="rw-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#rw-bg)"/>
  <rect x="0" y="200" width="800" height="300" fill="url(#rw-ocean)"/>

  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Reef Watch</text>
  <text x="400" y="68" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13">Satellite Coral Reef Monitor · CesiumJS Globe · AI Analysis</text>

  <!-- Globe representation -->
  <circle cx="400" cy="250" r="140" fill="#0c2d3f" stroke="#22d3ee" stroke-width="2" opacity="0.8"/>
  <ellipse cx="400" cy="250" rx="140" ry="50" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="400" cy="250" rx="100" ry="140" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.35"/>
  <ellipse cx="400" cy="250" rx="50" ry="140" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <line x1="260" y1="250" x2="540" y2="250" stroke="#22d3ee" stroke-width="0.8" opacity="0.2"/>

  <!-- Reef markers -->
  <circle cx="340" cy="210" r="8" fill="#06b6d4" opacity="0.8"/>
  <circle cx="340" cy="210" r="12" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <circle cx="340" cy="210" r="16" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>

  <circle cx="450" cy="230" r="6" fill="#22c55e" opacity="0.8"/>
  <circle cx="450" cy="230" r="10" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>

  <circle cx="380" cy="300" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="380" cy="300" r="11" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <circle cx="470" cy="280" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="470" cy="280" r="9" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>

  <circle cx="320" cy="270" r="6" fill="#22c55e" opacity="0.8"/>

  <!-- Legend -->
  <rect x="40" y="120" width="160" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.9"/>
  <text x="120" y="145" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Reef Health</text>
  <circle cx="60" cy="168" r="5" fill="#22c55e"/><text x="75" y="172" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10">Healthy</text>
  <circle cx="60" cy="190" r="5" fill="#06b6d4"/><text x="75" y="194" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="10">Monitoring</text>
  <circle cx="60" cy="212" r="5" fill="#f59e0b"/><text x="75" y="216" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="10">Stressed</text>
  <circle cx="60" cy="234" r="5" fill="#ef4444"/><text x="75" y="238" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="10">Critical</text>

  <!-- Data panel -->
  <rect x="600" y="120" width="170" height="180" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.9"/>
  <text x="685" y="148" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Satellite Data</text>
  <text x="685" y="175" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Sentinel-2 imagery</text>
  <text x="685" y="195" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">NOAA coral data</text>
  <text x="685" y="215" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">SST anomalies</text>
  <text x="685" y="240" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AI Assessment</text>
  <text x="685" y="262" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Bleaching risk</text>
  <text x="685" y="282" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Health scoring</text>

  <!-- Bottom -->
  <rect x="100" y="425" width="600" height="50" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="447" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2">STACK</text>
  <text x="200" y="465" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">FastAPI :8900</text>
  <text x="340" y="465" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">CesiumJS</text>
  <text x="460" y="465" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">Satellite APIs</text>
  <text x="600" y="465" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">GeoJSON</text>
</svg>
