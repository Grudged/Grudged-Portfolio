  <line x1="370" y1="270" x2="220" y2="320" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="390" y1="270" x2="340" y2="320" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="410" y1="270" x2="460" y2="320" stroke="#334155" stroke-width="1" opacity="0.4"/>
