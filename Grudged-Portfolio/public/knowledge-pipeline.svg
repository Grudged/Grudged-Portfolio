<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="kp-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="kp-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#kp-bg)"/>

  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Knowledge Pipeline</text>
  <text x="400" y="68" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13">Self-Improving AI · Nightly Compile · LoRA Fine-Tune</text>

  <!-- Left: Collectors -->
  <rect x="30" y="120" width="160" height="240" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="110" y="148" text-anchor="middle" fill="#f59e0b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">39+ Collectors</text>
  <text x="110" y="175" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">ESPN Scores</text>
  <text x="110" y="195" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Odds API</text>
  <text x="110" y="215" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">CoinGecko</text>
  <text x="110" y="235" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">DeFiLlama</text>
  <text x="110" y="255" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">SEC EDGAR</text>
  <text x="110" y="275" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">GitHub Activity</text>
  <text x="110" y="295" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">FDA / BLS</text>
  <text x="110" y="320" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">+ 30 more...</text>
  <text x="110" y="345" text-anchor="middle" fill="#475569" font-family="JetBrains Mono,monospace" font-size="9">systemd timers</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="240" x2="250" y2="240" stroke="url(#kp-accent)" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="248,235 258,240 248,245" fill="#a78bfa"/>

  <!-- Center: Warehouse -->
  <rect x="260" y="160" width="160" height="100" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="340" y="200" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Data Warehouse</text>
  <text x="340" y="220" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">warehouse.db</text>
  <text x="340" y="238" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">edge.db · chase.db</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="265" x2="340" y2="300" stroke="url(#kp-accent)" stroke-width="2"/>
  <polygon points="335,298 340,308 345,298" fill="#a78bfa"/>

  <!-- Knowledge Compiler -->
  <rect x="260" y="310" width="160" height="80" rx="10" fill="url(#kp-accent)" opacity="0.9"/>
  <text x="340" y="342" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Knowledge</text>
  <text x="340" y="360" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Compiler</text>
  <text x="340" y="380" text-anchor="middle" fill="#e9d5ff" font-family="JetBrains Mono,monospace" font-size="9">nightly · 11 PM PT</text>

  <!-- Arrow 3 -->
  <line x1="425" y1="350" x2="480" y2="300" stroke="url(#kp-accent)" stroke-width="2"/>
  <polygon points="475,298 485,293 480,305" fill="#ec4899"/>

  <!-- Output: Reports + Training -->
  <rect x="485" y="130" width="140" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="555" y="157" text-anchor="middle" fill="#34d399" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Daily Reports</text>
  <text x="555" y="177" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Markdown · Wiki</text>

  <rect x="485" y="215" width="140" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="555" y="242" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Training Pairs</text>
  <text x="555" y="262" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Q&A · SQL · JSONL</text>

  <rect x="485" y="300" width="140" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="555" y="327" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">RAG Index</text>
  <text x="555" y="347" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">sqlite-vec · bge</text>

  <!-- Arrow 4 -->
  <line x1="555" y1="280" x2="555" y2="300" stroke="#334155" stroke-width="1"/>
  <line x1="630" y1="248" x2="670" y2="248" stroke="#334155" stroke-width="1.5"/>
  <polygon points="668,243 678,248 668,253" fill="#a78bfa"/>

  <!-- Right: Gemma -->
  <rect x="640" y="180" width="130" height="140" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="705" y="215" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">Gemma 4</text>
  <text x="705" y="237" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">26B MoE 4-bit</text>
  <text x="705" y="257" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">MLX · :8321</text>
  <text x="705" y="285" text-anchor="middle" fill="#a78bfa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">+ LoRA Adapter</text>
  <text x="705" y="305" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="9">retrain 12:15 AM</text>

  <!-- Feedback loop arrow -->
  <path d="M705 325 L705 430 L340 430 L340 395" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="335,397 340,387 345,397" fill="#ec4899" opacity="0.5"/>
  <text x="520" y="448" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10" font-style="italic">feedback loop — model improves nightly</text>

  <!-- Obsidian -->
  <rect x="50" y="410" width="120" height="48" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="110" y="434" text-anchor="middle" fill="#a78bfa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="500">Obsidian Vault</text>
  <text x="110" y="449" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="9">rsync every 30m</text>
</svg>
