<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="se-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="se-twitch" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9146ff"/><stop offset="100%" stop-color="#772ce8"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#se-bg)"/>

  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Stream Engine</text>
  <text x="400" y="68" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13">Twitch Bot · iRacing Telemetry · Gemma AI · Chat Logging</text>

  <!-- Twitch central -->
  <rect x="300" y="100" width="200" height="80" rx="12" fill="url(#se-twitch)" opacity="0.9"/>
  <text x="400" y="135" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Twitch Chat</text>
  <text x="400" y="158" text-anchor="middle" fill="#e9d5ff" font-family="JetBrains Mono,monospace" font-size="10">grudgedgaming</text>

  <!-- Data sources - left side -->
  <rect x="40" y="110" width="180" height="60" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="138" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">iRacing Telemetry</text>
  <text x="130" y="158" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">Lap times · Position · Car</text>
  <line x1="225" y1="140" x2="295" y2="140" stroke="#ef4444" stroke-width="1" opacity="0.5"/>

  <!-- Data sources - right side -->
  <rect x="580" y="110" width="180" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="670" y="138" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Blizzard API</text>
  <text x="670" y="158" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">WoW chars · 48 roster</text>
  <line x1="575" y1="140" x2="505" y2="140" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>

  <!-- Bot features -->
  <text x="400" y="225" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2">BOT COMMANDS</text>

  <rect x="50" y="245" width="155" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="127" y="272" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono,monospace" font-size="12" font-weight="600">!stats</text>
  <text x="127" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">iRacing live telemetry</text>

  <rect x="225" y="245" width="155" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="302" y="272" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono,monospace" font-size="12" font-weight="600">!wow [char]</text>
  <text x="302" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Character lookup</text>

  <rect x="400" y="245" width="155" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="477" y="272" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono,monospace" font-size="12" font-weight="600">!ask [q]</text>
  <text x="477" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Gemma 4 AI response</text>

  <rect x="575" y="245" width="175" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="662" y="272" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono,monospace" font-size="12" font-weight="600">!predict</text>
  <text x="662" y="295" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Twitch predictions</text>

  <!-- Gemma AI -->
  <rect x="250" y="355" width="180" height="70" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="340" y="385" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">Gemma 4</text>
  <text x="340" y="405" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">MLX · :8321</text>

  <!-- Chat log -->
  <rect x="480" y="355" width="180" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="570" y="385" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Chat Logger</text>
  <text x="570" y="405" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="10">chat_log.db · SQLite</text>

  <!-- Connection lines -->
  <line x1="400" y1="185" x2="340" y2="355" stroke="#9146ff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="185" x2="570" y2="355" stroke="#9146ff" stroke-width="1" opacity="0.3"/>

  <!-- Bottom -->
  <rect x="100" y="450" width="600" height="35" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="200" y="473" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">Python · FastAPI</text>
  <text x="400" y="473" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">Twitch IRC · :8910</text>
  <text x="600" y="473" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="10">systemd on Arch</text>
</svg>
