<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="rf-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="rf-accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#rf-bg)"/>

  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">RF Tomography</text>
  <text x="400" y="63" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13">5-Node ESP32-C3 Mesh · WiFi Signal Attenuation · Presence Detection</text>

  <!-- Room outline -->
  <rect x="150" y="100" width="500" height="300" rx="4" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="125" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2">ROOM LAYOUT</text>

  <!-- 5 nodes in a pentagon-ish arrangement -->
  <!-- Node 1: top-left -->
  <circle cx="220" cy="160" r="22" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="220" y="164" text-anchor="middle" fill="#34d399" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700">N1</text>
  <circle cx="220" cy="160" r="35" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
  <circle cx="220" cy="160" r="50" fill="none" stroke="#10b981" stroke-width="0.3" opacity="0.15"/>

  <!-- Node 2: top-right -->
  <circle cx="580" cy="160" r="22" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="580" y="164" text-anchor="middle" fill="#34d399" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700">N2</text>
  <circle cx="580" cy="160" r="35" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Node 3: middle-left -->
  <circle cx="190" cy="320" r="22" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="190" y="324" text-anchor="middle" fill="#34d399" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700">N3</text>
  <circle cx="190" cy="320" r="35" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Node 4: middle-right -->
  <circle cx="610" cy="320" r="22" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="610" y="324" text-anchor="middle" fill="#34d399" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700">N4</text>
  <circle cx="610" cy="320" r="35" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Node 5: bottom-center -->
  <circle cx="400" cy="370" r="22" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="374" text-anchor="middle" fill="#34d399" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700">N5</text>
  <circle cx="400" cy="370" r="35" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Signal lines between nodes -->
  <line x1="220" y1="160" x2="580" y2="160" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="220" y1="160" x2="190" y2="320" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="220" y1="160" x2="610" y2="320" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="220" y1="160" x2="400" y2="370" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="580" y1="160" x2="190" y2="320" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="580" y1="160" x2="610" y2="320" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="580" y1="160" x2="400" y2="370" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="190" y1="320" x2="610" y2="320" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="190" y1="320" x2="400" y2="370" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
  <line x1="610" y1="320" x2="400" y2="370" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>

  <!-- Detected person silhouette hint -->
  <circle cx="380" cy="240" r="30" fill="#ef4444" opacity="0.12"/>
  <circle cx="380" cy="240" r="15" fill="#ef4444" opacity="0.2"/>
  <circle cx="380" cy="240" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="380" y="210" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">DETECTED</text>

  <!-- Right panel: ESP32-C3 info -->
  <rect x="670" y="110" width="110" height="130" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.9"/>
  <text x="725" y="135" text-anchor="middle" fill="#34d399" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">ESP32-C3</text>
  <text x="725" y="158" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="9">WiFi RSSI</text>
  <text x="725" y="175" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="9">MicroPython</text>
  <text x="725" y="192" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono,monospace" font-size="9">Mesh network</text>
  <text x="725" y="215" text-anchor="middle" fill="#67e8f9" font-family="JetBrains Mono,monospace" font-size="9">→ FastAPI :8901</text>
  <text x="725" y="232" text-anchor="middle" fill="#67e8f9" font-family="JetBrains Mono,monospace" font-size="9">→ Mission Ctrl</text>

  <!-- Bottom -->
  <rect x="150" y="430" width="500" height="45" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11">Signal attenuation between nodes reveals position &amp; movement through walls</text>
</svg>
